<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>How to Publish WaziBiz Website Free</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --g:#25D366; --gd:#128C7E; --bg:#050e09; --card:#0d1f14;
    --s1:#0b1a10; --s2:#0f2318; --bdr:#183525;
    --txt:#e6f2ea; --mut:#4d7a5e;
    --gold:#f0c040; --red:#ff5252; --org:#ff8c42; --blu:#4a9fff;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;overflow-x:hidden;}
  h1,h2,h3,h4{font-family:'Syne',sans-serif;font-weight:900;}

  /* HEADER */
  .header{
    background:linear-gradient(160deg,#061510 0%,var(--bg) 70%);
    padding:56px 24px 44px;
    text-align:center;
    border-bottom:1px solid var(--bdr);
    position:relative;
    overflow:hidden;
  }
  .header::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse 70% 60% at 50% 80%,rgba(37,211,102,0.08),transparent 60%);
  }
  .header-badge{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(37,211,102,0.1);border:1px solid rgba(37,211,102,0.25);
    border-radius:99px;padding:5px 16px;font-size:12px;color:var(--g);
    font-weight:600;margin-bottom:20px;letter-spacing:.5px;
  }
  .dot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .header h1{font-size:clamp(28px,5vw,54px);letter-spacing:-2px;line-height:1.05;margin-bottom:14px;}
  .header h1 .g{color:var(--g);}
  .header p{color:var(--mut);font-size:15px;line-height:1.7;max-width:500px;margin:0 auto 28px;}
  .pill-row{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;}
  .pill{background:rgba(37,211,102,0.08);border:1px solid rgba(37,211,102,0.2);
    border-radius:99px;padding:5px 14px;font-size:11px;color:var(--g);font-weight:700;}

  /* PROGRESS STRIP */
  .progress-strip{
    background:var(--s1);border-bottom:1px solid var(--bdr);
    padding:16px 24px;display:flex;align-items:center;gap:0;
    overflow-x:auto;position:sticky;top:0;z-index:50;
    scrollbar-width:none;
  }
  .progress-strip::-webkit-scrollbar{display:none;}
  .prog-step{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    min-width:64px;cursor:pointer;padding:4px 6px;border-radius:10px;
    transition:background .2s;flex-shrink:0;
  }
  .prog-step:hover{background:rgba(37,211,102,0.06);}
  .prog-num{
    width:30px;height:30px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;transition:all .3s;
    border:2px solid var(--bdr);color:var(--mut);
  }
  .prog-num.active{background:var(--g);border-color:var(--g);color:#111;}
  .prog-num.done{background:rgba(37,211,102,0.15);border-color:var(--g);color:var(--g);}
  .prog-lbl{font-size:9px;color:var(--mut);text-align:center;white-space:nowrap;max-width:60px;overflow:hidden;text-overflow:ellipsis;}
  .prog-line{flex:1;height:2px;background:var(--bdr);min-width:12px;flex-shrink:0;align-self:center;margin-bottom:14px;}
  .prog-line.done{background:var(--g);}

  /* MAIN LAYOUT */
  .main{max-width:860px;margin:0 auto;padding:40px 24px 80px;}

  /* STEP CARD */
  .step-section{display:none;animation:fadeUp .35s ease;}
  .step-section.active{display:block;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  .step-header{
    background:var(--card);border:1px solid var(--bdr);border-radius:20px;
    padding:28px 32px;margin-bottom:24px;position:relative;overflow:hidden;
  }
  .step-header::before{
    content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,var(--g),transparent);
  }
  .step-meta{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .step-num-big{
    width:44px;height:44px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Syne',sans-serif;font-size:20px;font-weight:900;
    flex-shrink:0;
  }
  .step-tag{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--g);}
  .step-time{
    margin-left:auto;background:rgba(37,211,102,0.08);border:1px solid rgba(37,211,102,0.2);
    border-radius:99px;padding:3px 12px;font-size:11px;color:var(--g);font-weight:600;
    white-space:nowrap;
  }
  .step-title{font-size:clamp(22px,4vw,34px);letter-spacing:-1px;margin-bottom:10px;line-height:1.15;}
  .step-intro{color:var(--mut);font-size:14px;line-height:1.7;}

  /* CONTENT BLOCKS */
  .block{margin-bottom:20px;}
  .block-title{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:10px;display:flex;align-items:center;gap:8px;}

  /* CODE BLOCK */
  .code-wrap{background:#061510;border:1px solid var(--bdr);border-radius:12px;overflow:hidden;margin:12px 0;}
  .code-bar{
    background:#040d09;padding:7px 14px;
    display:flex;justify-content:space-between;align-items:center;
    border-bottom:1px solid var(--bdr);
  }
  .code-lang{font-size:10px;color:var(--mut);font-family:monospace;}
  .copy-btn{
    background:transparent;border:1px solid var(--bdr);color:var(--mut);
    border-radius:6px;padding:3px 12px;font-size:10px;cursor:pointer;
    font-family:'DM Sans',sans-serif;transition:all .2s;
  }
  .copy-btn:hover,.copy-btn.copied{background:rgba(37,211,102,0.1);border-color:var(--g);color:var(--g);}
  pre{padding:16px;font-size:12px;color:#7dc99a;font-family:'Courier New',monospace;
    overflow-x:auto;line-height:1.7;white-space:pre-wrap;word-break:break-word;}

  /* TIP */
  .tip{border-radius:10px;padding:12px 16px;margin:12px 0;display:flex;gap:10px;align-items:flex-start;}
  .tip-free {background:rgba(37,211,102,0.07);border:1px solid rgba(37,211,102,0.2);}
  .tip-info {background:rgba(74,159,255,0.07);border:1px solid rgba(74,159,255,0.2);}
  .tip-warn {background:rgba(240,192,64,0.07);border:1px solid rgba(240,192,64,0.2);}
  .tip-good {background:rgba(37,211,102,0.07);border:1px solid rgba(37,211,102,0.2);}
  .tip-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
  .tip-text{font-size:13px;color:var(--txt);line-height:1.65;}

  /* NUMBERED STEPS */
  .num-steps{display:flex;flex-direction:column;gap:12px;margin:12px 0;}
  .num-step{display:flex;gap:14px;align-items:flex-start;}
  .n-badge{
    width:28px;height:28px;border-radius:8px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:13px;background:rgba(37,211,102,0.1);
    border:1px solid rgba(37,211,102,0.25);color:var(--g);
  }
  .n-title{font-weight:700;color:var(--txt);margin-bottom:3px;font-size:14px;}
  .n-desc{color:var(--mut);font-size:13px;line-height:1.6;}
  .n-link{
    display:inline-flex;align-items:center;gap:6px;margin-top:6px;
    background:var(--g);color:#0a1a0e;border-radius:8px;
    padding:5px 14px;font-size:12px;font-weight:700;text-decoration:none;transition:all .2s;
  }
  .n-link:hover{background:#1dba58;}

  /* TOOL COMPARE */
  .tool-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:12px 0;}
  .tool-card{
    background:var(--card);border:1px solid var(--bdr);border-radius:14px;
    padding:18px;transition:border-color .2s;cursor:default;
  }
  .tool-card:hover{border-color:rgba(37,211,102,0.3);}
  .tool-icon{font-size:28px;margin-bottom:10px;}
  .tool-name{font-weight:700;color:var(--txt);font-size:14px;margin-bottom:4px;}
  .tool-cost{font-size:11px;font-weight:700;border-radius:99px;padding:2px 10px;display:inline-block;margin-bottom:8px;}
  .tool-cost.free{background:rgba(37,211,102,0.1);color:var(--g);border:1px solid rgba(37,211,102,0.2);}
  .tool-cost.paid{background:rgba(255,140,66,0.1);color:var(--org);border:1px solid rgba(255,140,66,0.2);}
  .tool-desc{color:var(--mut);font-size:12px;line-height:1.5;}
  .tool-rec{
    margin-top:8px;font-size:10px;font-weight:700;color:var(--g);
    display:flex;align-items:center;gap:4px;
  }

  /* CHECKLIST */
  .checklist{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:20px;margin:16px 0;}
  .checklist-title{font-weight:700;color:var(--txt);font-size:14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
  .check-pct{color:var(--g);font-size:12px;}
  .check-bar{background:var(--bdr);border-radius:99px;height:5px;margin-bottom:14px;}
  .check-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gd),var(--g));transition:width .4s;}
  .check-item{display:flex;gap:10px;margin-bottom:9px;cursor:pointer;align-items:flex-start;}
  .check-box{
    width:20px;height:20px;border-radius:6px;flex-shrink:0;margin-top:1px;
    border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;
    transition:all .2s;background:transparent;
  }
  .check-box.ticked{background:var(--g);border-color:var(--g);}
  .check-box.ticked::after{content:'✓';color:#111;font-size:11px;font-weight:900;}
  .check-lbl{font-size:13px;color:var(--txt);line-height:1.5;transition:all .2s;}
  .check-lbl.done{color:var(--mut);text-decoration:line-through;}

  /* NAV BUTTONS */
  .step-nav{display:flex;justify-content:space-between;gap:12px;margin-top:28px;flex-wrap:wrap;}
  .btn-back{
    background:transparent;border:1px solid var(--bdr);color:var(--mut);
    border-radius:12px;padding:12px 22px;font-size:14px;font-weight:600;
    cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;
  }
  .btn-back:hover{border-color:var(--g);color:var(--g);}
  .btn-next{
    background:linear-gradient(90deg,var(--gd),var(--g));color:#0a1a0e;
    border:none;border-radius:12px;padding:12px 28px;font-size:14px;font-weight:800;
    cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;
    box-shadow:0 6px 24px rgba(37,211,102,0.2);
  }
  .btn-next:hover{box-shadow:0 8px 30px rgba(37,211,102,0.35);transform:translateY(-1px);}
  .btn-overview{
    background:transparent;border:none;color:var(--mut);font-size:12px;
    cursor:pointer;font-family:'DM Sans',sans-serif;transition:color .2s;
  }
  .btn-overview:hover{color:var(--g);}

  /* OVERVIEW */
  .overview-grid{display:flex;flex-direction:column;gap:10px;margin:24px 0;}
  .ov-item{
    background:var(--card);border:1px solid var(--bdr);border-radius:14px;
    padding:16px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:all .2s;
  }
  .ov-item:hover{border-color:rgba(37,211,102,0.35);transform:translateX(4px);}
  .ov-icon{font-size:24px;flex-shrink:0;}
  .ov-num{
    width:32px;height:32px;border-radius:10px;background:rgba(37,211,102,0.08);
    border:1px solid rgba(37,211,102,0.2);display:flex;align-items:center;justify-content:center;
    font-weight:900;color:var(--g);font-size:14px;flex-shrink:0;font-family:'Syne',sans-serif;
  }
  .ov-title{font-weight:700;color:var(--txt);font-size:14px;}
  .ov-meta{color:var(--mut);font-size:12px;margin-top:2px;}
  .ov-badge{
    margin-left:auto;padding:3px 12px;border-radius:99px;font-size:10px;font-weight:700;
    background:rgba(37,211,102,0.08);color:var(--g);border:1px solid rgba(37,211,102,0.2);
    flex-shrink:0;white-space:nowrap;
  }
  .ov-badge.done{background:rgba(37,211,102,0.15);color:var(--g);}

  /* COST TABLE */
  .cost-table{width:100%;border-collapse:collapse;margin:12px 0;}
  .cost-table th{text-align:left;padding:10px 14px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);border-bottom:1px solid var(--bdr);}
  .cost-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid rgba(24,53,37,0.4);}
  .cost-table tr:last-child td{border-bottom:none;}
  .cost-table .cost-free{color:var(--g);font-weight:700;}
  .cost-table .cost-total{color:var(--g);font-weight:900;font-size:15px;}

  /* SCREENSHOT MOCK */
  .screen-mock{
    background:#1a1a2e;border:1px solid var(--bdr);border-radius:14px;
    overflow:hidden;margin:14px 0;
  }
  .screen-bar{
    background:#111;padding:8px 16px;display:flex;align-items:center;gap:8px;
    border-bottom:1px solid var(--bdr);
  }
  .screen-dots{display:flex;gap:5px;}
  .screen-dot{width:10px;height:10px;border-radius:50%;}
  .screen-url{
    flex:1;background:rgba(255,255,255,0.05);border-radius:6px;
    padding:4px 12px;font-size:11px;color:var(--mut);font-family:monospace;
    text-align:center;
  }
  .screen-body{padding:20px;min-height:80px;}

  /* RESPONSIVE */
  @media(max-width:600px){
    .header{padding:48px 16px 36px;}
    .main{padding:28px 16px 60px;}
    .step-header{padding:20px;}
    .progress-strip{padding:12px 16px;}
  }
</style>
</head>
<body>

<div class="header">
  <div style="position:relative">
    <div class="header-badge"><div class="dot"></div>Free · No Credit Card · Live in Under 1 Hour</div>
    <h1>Publish <span class="g">WaziBiz</span><br/>Website for Free</h1>
    <p>A step-by-step guide to get your WaziBiz landing page live on the internet — completely free, in under 60 minutes.</p>
    <div class="pill-row">
      <span class="pill">🚀 Netlify</span>
      <span class="pill">📁 GitHub</span>
      <span class="pill">🌐 Free Domain</span>
      <span class="pill">🔒 Free HTTPS</span>
      <span class="pill">⚡ 5 min deploy</span>
    </div>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-strip" id="progressStrip"></div>

<!-- MAIN -->
<div class="main" id="mainContent"></div>

<script>
const STEPS = [
  {
    id:0, icon:"🗺️", label:"Overview", color:"#25D366",
    title:"Your Free Publishing Plan", time:"2 min read",
    tag:"START HERE",
    intro:"Before we begin, here's the full picture. You'll go from a saved HTML file on your phone or PC to a live website with a real link — in under 60 minutes, spending R0.",
  },
  {
    id:1, icon:"💾", label:"Get the file", color:"#25D366",
    title:"Download Your WaziBiz HTML File", time:"5 min",
    tag:"STEP 1 OF 6",
    intro:"Your WaziBiz landing page is one single HTML file. You just need to save it to your phone or computer — then we'll push it live.",
  },
  {
    id:2, icon:"📁", label:"GitHub", color:"#4a9fff",
    title:"Create a Free GitHub Account", time:"10 min",
    tag:"STEP 2 OF 6",
    intro:"GitHub is a free platform where you store your website files. Think of it as Google Drive — but for websites. Netlify (Step 3) reads from GitHub to publish your site.",
  },
  {
    id:3, icon:"🚀", label:"Netlify", color:"#ff8c42",
    title:"Deploy on Netlify in 2 Minutes", time:"10 min",
    tag:"STEP 3 OF 6",
    intro:"Netlify is the easiest free hosting platform in the world. Drag your file in — it goes live instantly. No coding, no server, no setup.",
  },
  {
    id:4, icon:"🌐", label:"Domain", color:"#f0c040",
    title:"Get a Free or Cheap Domain Name", time:"15 min",
    tag:"STEP 4 OF 6",
    intro:"Your site will be live at something like wazibiz.netlify.app (free). If you want wazibiz.co.za, we'll show you where to get it for R60/year and connect it in minutes.",
  },
  {
    id:5, icon:"🔒", label:"HTTPS", color:"#25D366",
    title:"Secure Your Site with Free HTTPS", time:"5 min",
    tag:"STEP 5 OF 6",
    intro:"HTTPS means your site shows a padlock 🔒 in the browser — customers trust it more. Netlify does this automatically for free. Nothing to install.",
  },
  {
    id:6, icon:"✅", label:"Go Live!", color:"#f0c040",
    title:"You're Live — Share WaziBiz!", time:"Done!",
    tag:"STEP 6 OF 6",
    intro:"Your WaziBiz website is now live on the internet. Here's how to share it with traders, put it on WhatsApp, and keep it updated as your business grows.",
  },
];

let current = 0;
const doneSteps = new Set();
const checkState = {}; // track checkbox state per step

function buildProgress(){
  const strip = document.getElementById('progressStrip');
  strip.innerHTML = '';
  STEPS.forEach((s,i) => {
    if(i > 0){
      const line = document.createElement('div');
      line.className = 'prog-line' + (doneSteps.has(i) ? ' done' : '');
      strip.appendChild(line);
    }
    const div = document.createElement('div');
    div.className = 'prog-step';
    div.onclick = () => goTo(i);
    const num = document.createElement('div');
    num.className = 'prog-num' + (current === i ? ' active' : doneSteps.has(i) ? ' done' : '');
    num.textContent = doneSteps.has(i) ? '✓' : (i === 0 ? '★' : i);
    const lbl = document.createElement('div');
    lbl.className = 'prog-lbl';
    lbl.textContent = s.label;
    div.appendChild(num); div.appendChild(lbl);
    strip.appendChild(div);
  });
}

function goTo(n){
  current = n;
  buildProgress();
  renderStep();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderStep(){
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '';
  if(current === 0){ renderOverview(mc); return; }
  const s = STEPS[current];
  const sec = document.createElement('div');
  sec.className = 'step-section active';

  // Header
  sec.innerHTML += `
    <div class="step-header">
      <div class="step-meta">
        <div class="step-num-big" style="background:${s.color}18;border:2px solid ${s.color}44;color:${s.color};">${s.icon}</div>
        <div>
          <div class="step-tag">${s.tag}</div>
        </div>
        <div class="step-time">⏱ ${s.time}</div>
      </div>
      <h2 class="step-title">${s.title}</h2>
      <p class="step-intro">${s.intro}</p>
    </div>`;

  // Body content per step
  const body = document.createElement('div');
  STEP_CONTENT[current](body);
  sec.appendChild(body);

  // Checklist
  const cl = buildChecklist(current);
  sec.appendChild(cl);

  // Navigation
  const nav = document.createElement('div');
  nav.className = 'step-nav';
  const left = document.createElement('div');
  left.style.display = 'flex'; left.style.gap = '10px'; left.style.alignItems = 'center';
  if(current > 0){
    const back = document.createElement('button');
    back.className = 'btn-back';
    back.textContent = current === 1 ? '← Overview' : `← Step ${current-1}`;
    back.onclick = () => goTo(current - 1);
    left.appendChild(back);
  }
  const ovBtn = document.createElement('button');
  ovBtn.className = 'btn-overview';
  ovBtn.textContent = '📋 All Steps';
  ovBtn.onclick = () => goTo(0);
  left.appendChild(ovBtn);

  const next = document.createElement('button');
  next.className = 'btn-next';
  if(current < STEPS.length - 1){
    next.textContent = `✓ Done → Step ${current + 1}`;
    next.onclick = () => { doneSteps.add(current); goTo(current + 1); };
  } else {
    next.textContent = '🎉 My Site is Live!';
    next.onclick = () => { doneSteps.add(current); goTo(0); };
  }
  nav.appendChild(left); nav.appendChild(next);
  sec.appendChild(nav);
  mc.appendChild(sec);
}

const CHECKLISTS = {
  1:["Opened Claude.ai and found my WaziBiz landing page file","Downloaded / copied the HTML file","Saved it on my device as wazibiz.html","Confirmed the file opens in my browser and looks correct"],
  2:["Visited github.com and clicked Sign Up","Created account with my email","Verified my email address","Created a new repository called 'wazibiz-website'","Uploaded wazibiz.html to the repository","File is visible in the repository"],
  3:["Visited netlify.com and clicked Sign Up with GitHub","Authorized Netlify to access my GitHub","Clicked 'Add new site' → 'Import from Git'","Selected my wazibiz-website repository","Clicked Deploy — site went live!","Copied my free Netlify URL (e.g. wazibiz.netlify.app)","Opened the URL in my browser — site looks perfect"],
  4:["Decided on free Netlify subdomain OR custom domain","If custom: visited registry.net.za and searched for wazibiz.co.za","Registered the domain (R60–R80/year)","In Netlify: went to Domain Settings → Add custom domain","Typed in wazibiz.co.za","Updated DNS nameservers at my domain registrar to Netlify's","Waited 10–30 min for DNS to activate","Site now loads at my custom domain"],
  5:["Opened Netlify Dashboard → my site → Domain Settings","Scrolled to HTTPS section","Clicked 'Verify DNS configuration'","Clicked 'Provision certificate'","Waited 2–5 minutes","Refreshed — padlock 🔒 appears in browser bar","Site loads on https:// — secure!"],
  6:["Copied my live website URL","Created a WhatsApp status update sharing the link","Shared in relevant WhatsApp community groups","Posted on Facebook with a short video demo","Added website link to my WhatsApp Business profile","Created a free QR code at qr-code-generator.com","Printed QR code on flyers or displayed at events"],
};

function buildChecklist(stepId){
  const items = CHECKLISTS[stepId] || [];
  if(!items.length) return document.createElement('div');
  if(!checkState[stepId]) checkState[stepId] = new Array(items.length).fill(false);

  const wrap = document.createElement('div');
  wrap.className = 'checklist';

  const titleRow = document.createElement('div');
  titleRow.className = 'checklist-title';
  const titleTxt = document.createElement('span');
  titleTxt.textContent = '✅ Step Checklist';
  const pct = document.createElement('span');
  pct.className = 'check-pct';
  titleRow.appendChild(titleTxt); titleRow.appendChild(pct);
  wrap.appendChild(titleRow);

  const bar = document.createElement('div'); bar.className = 'check-bar';
  const fill = document.createElement('div'); fill.className = 'check-fill';
  bar.appendChild(fill); wrap.appendChild(bar);

  const update = () => {
    const done = checkState[stepId].filter(Boolean).length;
    const p = Math.round((done/items.length)*100);
    fill.style.width = p + '%';
    pct.textContent = p + '% done';
  };

  items.forEach((txt, i) => {
    const row = document.createElement('div'); row.className = 'check-item';
    const box = document.createElement('div');
    box.className = 'check-box' + (checkState[stepId][i] ? ' ticked' : '');
    const lbl = document.createElement('span');
    lbl.className = 'check-lbl' + (checkState[stepId][i] ? ' done' : '');
    lbl.textContent = txt;
    row.appendChild(box); row.appendChild(lbl);
    row.onclick = () => {
      checkState[stepId][i] = !checkState[stepId][i];
      box.className = 'check-box' + (checkState[stepId][i] ? ' ticked' : '');
      lbl.className = 'check-lbl' + (checkState[stepId][i] ? ' done' : '');
      update();
    };
    wrap.appendChild(row);
  });
  update();
  return wrap;
}

function tip(type,icon,text){ return `<div class="tip tip-${type}"><span class="tip-icon">${icon}</span><div class="tip-text">${text}</div></div>`; }
function code(lang,content){ return `<div class="code-wrap"><div class="code-bar"><span class="code-lang">${lang}</span><button class="copy-btn" onclick="copyCode(this,'${encodeURIComponent(content)}')">Copy</button></div><pre>${content}</pre></div>`; }
function numStep(n,color,title,desc,link){ return `<div class="num-step"><div class="n-badge" style="background:${color}18;border-color:${color}44;color:${color};">${n}</div><div><div class="n-title">${title}</div><div class="n-desc">${desc}</div>${link ? `<a href="${link}" target="_blank" class="n-link" style="background:${color}">Open →</a>` : ''}</div></div>`; }

function copyCode(btn, encoded){
  const text = decodeURIComponent(encoded);
  navigator.clipboard?.writeText(text).catch(()=>{});
  btn.textContent = '✓ Copied!'; btn.classList.add('copied');
  setTimeout(()=>{ btn.textContent='Copy'; btn.classList.remove('copied'); }, 2000);
}
